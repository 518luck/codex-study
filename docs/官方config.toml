################################################################################
# 应用 Apps / 连接器 Connectors
################################################################################

# 针对每个应用（per-app）的可选控制。
[apps]
# [_default] 会被应用到所有 app，除非在特定 app 内部被覆盖（override）。
# [apps._default]
# enabled = true
# destructive_enabled = true
# open_world_enabled = true
#
# [apps.google_drive]
# enabled = false
# destructive_enabled = false            # 拦截具有破坏性提示（destructive-hint）的工具对该应用的操作
# default_tools_enabled = true
# default_tools_approval_mode = "prompt" # auto | prompt | approve
#
# [apps.google_drive.tools."files/delete"]
# enabled = false
# approval_mode = "approve"

# 一个可选的推荐白名单，用于 Codex 能够推荐给用户去安装的连接器或插件。
# [tool_suggest]
# discoverables = [
#   { type = "connector", id = "gmail" },
#   { type = "plugin", id = "figma@openai-curated" },
# ]
# disabled_tools = [
#   { type = "plugin", id = "slack@openai-curated" },
#   { type = "connector", id = "connector_googlecalendar" },
# ]

