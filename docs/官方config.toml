################################################################################
# 项目 Projects（信任级别）
################################################################################

[projects]
# 将特定的工作树（worktrees）标记为可信（trusted）或者不可信（untrusted）。
# [projects."/absolute/path/to/project"]
# trust_level = "trusted"  # 或者填 "untrusted"

################################################################################
# 工具 Tools
################################################################################

[tools]
# view_image = true

################################################################################
# 开放遥测 OpenTelemetry (OTEL) - 默认已禁用
################################################################################

[otel]
# 在日志中包含用户的提示词（prompt）文本。默认：false
log_user_prompt = false
# 应用于遥测数据上的环境标签。默认："dev"
environment = "dev"
# 导出器 Exporter：none（默认） | otlp-http | otlp-grpc
exporter = "none"
# 链路追踪导出器 Trace exporter：none（默认） | otlp-http | otlp-grpc
trace_exporter = "none"
# 指标导出器 Metrics exporter：none | statsig | otlp-http | otlp-grpc
metrics_exporter = "statsig"

# OTLP/HTTP 导出器配置示例
# [otel.exporter."otlp-http"]
# endpoint = "https://otel.example.com/v1/logs"
# protocol = "binary"                         # "binary" | "json"

# [otel.exporter."otlp-http".headers]
# "x-otlp-api-key" = "${OTLP_TOKEN}"

# [otel.exporter."otlp-http".tls]
# ca-certificate = "certs/otel-ca.pem"
# client-certificate = "/etc/codex/certs/client.pem"
# client-private-key = "/etc/codex/certs/client-key.pem"

# OTLP/gRPC Trace 导出器配置示例
# [otel.trace_exporter."otlp-grpc"]
# endpoint = "https://otel.example.com:4317"
# headers = { "x-otlp-meta" = "abc123" }

################################################################################
# Windows
################################################################################

[windows]
# 原生的 Windows 沙箱模式（仅限 Windows 环境）：unelevated（未提权） | elevated（已提权）
sandbox = "unelevated"