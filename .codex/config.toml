# ==========================================
# Codex CLI / App 完整配置文件 (config.toml)
# 结构已优化，符合 TOML 语法规范
# ==========================================

# ------------------------------------------
# 1. 核心大模型与交互设置 (Core Settings)
# ------------------------------------------

# 【默认大模型】
# 备选项: "gpt-5.5", "gpt-5.4", "gpt-5.3-Codex-Spark", "gpt-4.1-mini" 等。
# 大白话: 这就是你雇的“赛博包工头”。越新的模型越聪明，但可能消耗额度更快。
model = "gpt-5.4"

# 【模型推理算力/思考深度】(针对 o 系列等模型)
# 备选项: "low" (低), "medium" (中), "high" (高)
# 大白话: 遇到难题时，让 AI 挠破头皮想多久。选 high 思考得最深、最准，但也最慢。
model_reasoning_effort = "medium"

# 【AI 的沟通风格与语气】
# 备选项: "friendly" (友好热情), "pragmatic" (务实高冷), "none" (无预设)
# 大白话: AI 的情商设置。选 pragmatic 就是个莫得感情的打字机，不说废话，只给代码。
personality = "pragmatic"

# 【网络搜索模式】
# 备选项: "cached" (缓存题库), "live" (实时搜索), "disabled" (禁止联网)
# 大白话: AI 遇到不懂的能不能自己上网搜。live 是现搜现学；cached 是查官方整理好的安全题库，防网页投毒。
web_search = "live" 

# 【强制推理解析摘要】
# 备选项: true, false
# 大白话: 强制告诉系统，当前这个模型支不支持对长篇思考过程进行精简总结。
model_supports_reasoning_summaries = true 

# 【推理解析摘要模式】
# 备选项: "none" (禁用摘要), 或其他系统级支持的摘要参数
# 大白话: 要不要把 AI 脑子里的长篇大论总结成一句话告诉你。选 none 就是不总结，直接看结果。
model_reasoning_summary = "none" 

# 【模型话痨程度】
# 备选项: "low" (低), "high" (高)
# 大白话: AI 是个话痨还是个闷葫芦。low 意味着能用一行字说完绝不写两行，极致精简。
model_verbosity = "low" 

# 【模型上下文窗口限制】
# 备选项: 128000, 8192 等整数 (具体取决于模型本身的上限)
# 大白话: AI 的内存条大小。数字越大，它能同时记住的历史聊天记录和读取的文件就越多。
model_context_window = 128000 


# ------------------------------------------ 
# 2. 安全审批与沙盒权限 (Security & Approvals)
# ------------------------------------------

# 【审批策略】
# 备选项: "on-request" (按需询问), "never" (从不询问), "untrusted" (凡事必问), 或使用 { granular = { ... } } 细颗粒度配置
# 大白话: 敲黑板！这是防暴走开关。on-request 意味着它想删文件或跑复杂命令前，必须先等你点头。
approval_policy = "on-request"

# 【沙盒运行模式】
# 备选项: "workspace-write" (限工作区写入), "read-only" (只读), "danger-full-access" (危险！全盘访问)
# 大白话: 给 AI 划个活动圈子。workspace-write 意味着它只能在当前代码文件夹里折腾，去不了别的地方。
sandbox_mode = "workspace-write"

# 【默认权限预设方案】
# 备选项: ":workspace" (工作区), ":read-only" (只读), ":danger-no-sandbox" (无沙盒)，或自定义名称
# 大白话: 一套打包好的权限套餐。:workspace 就是标准的“只准在当前项目里活动”套餐。
default_permissions = ":workspace"


# ------------------------------------------
# 3. 界面集成与外部工具 (UI & Integrations)
# ------------------------------------------

# 【代码文件引用打开器】
# 备选项: "vscode", "cursor", "windsurf", "vscode-insiders", "none"
# 大白话: 当 AI 在终端里高亮某行代码时，你点那个链接，用哪个代码编辑器打开它。
file_opener = "vscode" 

# 【自定义系统日志存放目录】
# 备选项: 任意你电脑上的绝对路径字符串
# 大白话: AI 的工作日记（系统报错、运行日志）存在你电脑的哪个犄角旮旯。（此处保持注释）
# log_dir = "/absolute/path/to/codex-logs"

# 【外部通知脚本】
# 备选项: 包含执行程序和路径的数组，如 ["python3", "/path/to/notify.py"]
# 大白话: AI 跑完长耗时任务后，要不要触发个外部脚本（比如发个桌面弹窗或钉钉消息）叫你。（此处保持注释）
# notify = ["python3", "/path/to/notify.py"]


# ------------------------------------------
# 4. 操作系统专属设置 (OS Specific)
# ------------------------------------------

[windows]
# 【Windows 原生沙盒模式】
# 备选项: "elevated" (提权模式), "unelevated" (非提权模式)
# 大白话: Windows 专属的安全隔离服。elevated 就是要管理员权限给它穿上最严密的防弹衣，最安全。
sandbox = "elevated"


# ------------------------------------------
# 5. 终端执行环境 (Command Environment)
# ------------------------------------------

[shell_environment_policy]
# 【环境变量传递白名单】
# 备选项: 结合 inherit, set, exclude, include_only 使用的数组
# 大白话: AI 偷偷在后台跑脚本时，只准它看到你电脑里的 PATH 和 HOME，严防它偷看你的 AWS 或云服务器密钥。
include_only = ["PATH", "HOME"]


# ------------------------------------------
# 6. 功能开关 (Feature Flags)
# ------------------------------------------

[features]
# 【第三方应用连接器】(实验性)
# 备选项: true, false
# 大白话: 能不能让 AI 接入第三方的应用插件系统。
apps = false 

# 【生命周期钩子机制】
# 备选项: true, false
# 大白话: 自动化流水线开关。打开后，AI 改代码前后会自动触发你设定的脚本（比如改完自动跑一下 ESLint）。
hooks = true

# 【目标跟踪机制】(实验性)
# 备选项: true, false
# 大白话: 给 AI 立个 Flag。打开后可用 /goal 命令，让它在长篇大论干活中死盯目标，不忘初心。
goals = false

# 【记忆功能】
# 备选项: true, false
# 大白话: AI 的小本本。打开后它会跨对话记住你的代码习惯和踩过的坑，下次不用你再重复啰嗦。
memories = true

# 【多智能体并发协同】
# 备选项: true, false
# 大白话: 影分身之术。打开后，遇到复杂任务 AI 会分裂出多个小弟一起干活（注意：会成倍消耗你的 Token 额度！）。
multi_agent = true

# 【终端环境快照】
# 备选项: true, false
# 大白话: 终端环境的“存档”功能。有了它，AI 反复跑相似命令时不用每次都重新初始化，速度快得飞起。
shell_snapshot = true

# 【代码撤销功能】
# 备选项: true, false
# 大白话: 超级后悔药。打开后，AI 每轮对话都会打个 Git 幽灵快照，搞砸了可以一键撤销。
undo = false

# 【统一后台任务处理器】
# 备选项: true, false
# 大白话: 底层稳定性优化。能让 AI 帮你跑长时间任务（比如 npm install）时不会突然断开连接。
unified_exec = true


# ------------------------------------------
# 7. 遥测与反馈 (Telemetry & Feedback)
# ------------------------------------------

[feedback]
# 【向官方发送反馈】
# 备选项: true, false
# 大白话: 给官方打小报告的开关。关掉后，你在终端里用不了 /feedback 命令，官方也收不到你的报错日志。
enabled = false


# ------------------------------------------
# 8. 终端界面快捷键定制 (TUI Keymap)
# ------------------------------------------

# 【全局快捷键】
[tui.keymap.global]
# 备选项: 组合键字符串如 "ctrl-t", "ctrl-a" 等。传入空数组 [] 表示禁用该快捷键。
# 大白话: 全局生效的快捷键，不管光标在哪按了都有用。（此处保持注释）
# open_transcript = "ctrl-t"

# 【输入框快捷键】
[tui.keymap.composer]
# 备选项: "enter", "shift-enter", "ctrl-m" 等组合
# 大白话: 这个区域专门管你底下打字聊天的输入框。设为 enter 意味着回车键纯粹用来发消息。
submit = ["enter"]
# 禁用示例：
# submit = [] 
 
# 【编辑器快捷键】
[tui.keymap.editor]
# 备选项: 组合键字符串
# 大白话: 这个区域管的是代码编辑或多行文本行为。把换行改成了 Shift+Enter，彻底解决和发送消息抢按键的冲突。
insert_newline = ["shift-enter"]




# ------------------------------------------
# 9. 终端用户界面配置 (TUI Settings)
# ------------------------------------------

[tui]
# 底部状态栏显示的条目（按数组里的前后顺序排列显示）
status_line = [
    "model-with-reasoning", # 显示模型名称及推理级别
    "run-state",          # 显示 AI 运行状态（就绪/工作中/思考中）
    "five-hour-limit" ,           # 显示 5 小时内剩余提问配额
    "context-used",         # 显示已用上下文窗口百分比
    "weekly-limit"         # 显示每周剩余提问配额
] 

# 如果你也想顺手自定义一下顶部终端窗口的标题，可以用这个：
# "app-name" (应用名称，通常就是显示 Codex)
# "project" (当前项目名称)
# "spinner" (一个表示正在加载或运行的动态转圈小图标)
# "status" (运行状态，比如 Ready 或 Working)
# "thread" (当前对话的线程名称/ID)
# "git branch" (当前的 Git 分支)
# "model" (当前使用的 AI 模型)
# "task-progress" (多步任务的进度提示)
terminal_title = [
    "task-progress",              
    "thread"
]